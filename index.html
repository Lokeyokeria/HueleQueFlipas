    <script type="application/ld+json" id="base-schema">
      {

    <script>
      (function () {
        const SITE_NAME = "Huele Que Flipas";
        const SITE_URL = "https://huelequeflipas.es";
        const DEFAULT_IMAGE = SITE_URL + "/equivalencia-hqf.jpg";

        function cleanPath(pathname) {
          const normalized = (pathname || "").replace(/\/+$/, "");
          return normalized === "" ? "/" : normalized;
        }

        function toTitleCase(value) {
          return value
            .replace(/-/g, " ")
            .replace(/\s+/g, " ")
            .trim()
            .replace(/\b\w/g, (letter) => letter.toUpperCase());
        }

        function getCurrentPath() {
          const pathname = cleanPath(window.location.pathname);
          const hash = window.location.hash || "";

          if (hash.startsWith("#/")) {
            return cleanPath(hash.slice(1));
          }

          return pathname;
        }

        const seoMap = {
          "/": {
            title:
              "Huele Que Flipas | Perfumes de equivalencia premium para mujer, hombre, unisex, nicho y árabes",
            description:
              "Perfumes de equivalencia premium para mujer, hombre, unisex, nicho y árabes. Fragancias con larga duración, aroma de lujo, envío 24/48h, envío barato y ayuda real para elegir tu perfume.",
            type: "website",
            schemaType: "WebPage",
          },
          "/perfumes-hombre": {
            title:
              "Perfumes de equivalencia para hombre | Huele Que Flipas",
            description:
              "Descubre perfumes de equivalencia para hombre con carácter, larga duración y aroma de lujo. Fabricados en España, envío 24/48h y precio accesible.",
            type: "website",
            schemaType: "CollectionPage",
          },
          "/perfumes-mujer": {
            title:
              "Perfumes de equivalencia para mujer | Huele Que Flipas",
            description:
              "Perfumes de equivalencia para mujer con aromas elegantes, dulces, frescos y adictivos. Calidad top, envío barato y fragancias que huelen caro sin pagar de más.",
            type: "website",
            schemaType: "CollectionPage",
          },
          "/perfumes-unisex": {
            title:
              "Perfumes de equivalencia unisex | Huele Que Flipas",
            description:
              "Explora perfumes de equivalencia unisex con personalidad, larga duración y estilo moderno. Fragancias premium fabricadas en España.",
            type: "website",
            schemaType: "CollectionPage",
          },
          "/perfumes-arabes": {
            title:
              "Perfumes árabes de equivalencia | Huele Que Flipas",
            description:
              "Perfumes árabes intensos, elegantes y envolventes. Descubre aromas con presencia, larga duración y un precio inteligente en Huele Que Flipas.",
            type: "website",
            schemaType: "CollectionPage",
          },
          "/perfumes-nicho": {
            title:
              "Perfumes nicho de equivalencia | Huele Que Flipas",
            description:
              "Colección de perfumes nicho de equivalencia para quienes buscan algo especial. Aromas con personalidad, calidad top y envío 24/48h.",
            type: "website",
            schemaType: "CollectionPage",
          },
          "/perfumes-que-mas-duran": {
            title:
              "Perfumes de equivalencia que más duran | Huele Que Flipas",
            description:
              "Selección de perfumes de equivalencia con mayor duración y mejor fijación. Huele a lujo durante más tiempo con fragancias muy logradas.",
            type: "website",
            schemaType: "CollectionPage",
          },
          "/blog": {
            title: "Blog de perfumes de equivalencia | Huele Que Flipas",
            description:
              "Guías, comparativas, ideas de regalo y consejos para elegir perfumes de equivalencia, nicho y árabes que huelen increíble.",
            type: "website",
            schemaType: "Blog",
          },
          "/blog/equivalencia-baccarat-rouge": {
            title:
              "Equivalencia de Baccarat Rouge: guía completa | Huele Que Flipas",
            description:
              "Descubre a qué huele Baccarat Rouge, por qué gusta tanto y qué opción de equivalencia encaja mejor contigo.",
            type: "article",
            schemaType: "Article",
          },
          "/blog/perfumes-arabes-que-huelen-caro": {
            title:
              "Perfumes árabes que huelen caro | Huele Que Flipas",
            description:
              "Selección de perfumes árabes intensos, elegantes y con presencia. Ideas para acertar si buscas un aroma que deje huella.",
            type: "article",
            schemaType: "Article",
          },
          "/blog/perfumes-que-mas-duran": {
            title:
              "Perfumes que más duran: guía y favoritos | Huele Que Flipas",
            description:
              "Los perfumes de equivalencia que más duran y consejos para sacarles el máximo partido. Más fijación, más estela y mejor compra.",
            type: "article",
            schemaType: "Article",
          },
        };

        function buildProductSeo(currentPath) {
          if (!currentPath.startsWith("/producto/")) return null;

          const slug = currentPath.replace("/producto/", "").trim();
          if (!slug) return null;

          const readableName = toTitleCase(decodeURIComponent(slug));

          return {
            title: `${readableName} | Perfume de equivalencia premium | ${SITE_NAME}`,
            description: `Compra ${readableName} en ${SITE_NAME}. Perfume de equivalencia premium con larga duración, envío 24/48h, envío barato y atención cercana.`,
            type: "product",
            schemaType: "Product",
          };
        }

        function upsertMetaByName(name, content) {
          let tag = document.head.querySelector(`meta[name="${name}"]`);
          if (!tag) {
            tag = document.createElement("meta");
            tag.setAttribute("name", name);
            document.head.appendChild(tag);
          }
          tag.setAttribute("content", content);
        }

        function upsertMetaByProperty(property, content) {
          let tag = document.head.querySelector(`meta[property="${property}"]`);
          if (!tag) {
            tag = document.createElement("meta");
            tag.setAttribute("property", property);
            document.head.appendChild(tag);
          }
          tag.setAttribute("content", content);
        }

        function upsertCanonical(href) {
          let link = document.head.querySelector('link[rel="canonical"]');
          if (!link) {
            link = document.createElement("link");
            link.setAttribute("rel", "canonical");
            document.head.appendChild(link);
          }
          link.setAttribute("href", href);
        }

        function upsertJsonLd(id, data) {
          let script = document.getElementById(id);
          if (!script) {
            script = document.createElement("script");
            script.type = "application/ld+json";
            script.id = id;
            document.head.appendChild(script);
          }
          script.textContent = JSON.stringify(data);
        }

        function applySeo() {
          const path = getCurrentPath();

          const seo =
            seoMap[path] ||
            (path.startsWith("/producto/") ? buildProductSeo(path) : null) ||
            seoMap["/"];

          const canonicalUrl =
            path === "/" ? `${SITE_URL}/` : `${SITE_URL}${path}`;

          document.title = seo.title;
          upsertMetaByName("description", seo.description);
          upsertMetaByName("robots", "index,follow");
          upsertMetaByName(
            "googlebot",
            "index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
          );

          upsertMetaByProperty("og:title", seo.title);
          upsertMetaByProperty("og:description", seo.description);
          upsertMetaByProperty("og:url", canonicalUrl);
          upsertMetaByProperty("og:type", seo.type || "website");
          upsertMetaByProperty("og:site_name", SITE_NAME);
          upsertMetaByProperty("og:image", DEFAULT_IMAGE);
          upsertMetaByProperty(
            "og:image:alt",
            "Huele Que Flipas perfumes de equivalencia premium"
          );

          upsertMetaByName("twitter:title", seo.title);
          upsertMetaByName("twitter:description", seo.description);
          upsertMetaByName("twitter:image", DEFAULT_IMAGE);

          upsertCanonical(canonicalUrl);

          const pageSchema = {
            "@context": "https://schema.org",
            "@type": seo.schemaType || "WebPage",
            name: seo.title,
            description: seo.description,
            url: canonicalUrl,
            inLanguage: "es",
            isPartOf: {
              "@type": "WebSite",
              name: SITE_NAME,
              url: `${SITE_URL}/`,
            },
          };

          upsertJsonLd("dynamic-page-schema", pageSchema);
        }

        const originalPushState = history.pushState;
        history.pushState = function () {
          originalPushState.apply(history, arguments);
          window.dispatchEvent(new Event("locationchange"));
        };

        const originalReplaceState = history.replaceState;
        history.replaceState = function () {
          originalReplaceState.apply(history, arguments);
          window.dispatchEvent(new Event("locationchange"));
        };

        window.addEventListener("popstate", applySeo);
        window.addEventListener("hashchange", applySeo);
        window.addEventListener("locationchange", applySeo);
        document.addEventListener("DOMContentLoaded", applySeo);

        applySeo();
      })();
    </script>
  </head>
