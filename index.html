<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO básico -->
    <title>Huele Que Flipas | Perfumes de equivalencia que huelen a lujo</title>
    <meta
      name="description"
      content="Perfumes de equivalencia con vibra premium: huelen a lujo sin pagar lujo. Compra fácil, envío rápido y ayuda para elegir tu aroma."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://huelequeflipas.es/" />

    <!-- Color navegador móvil -->
    <meta name="theme-color" content="#0284c7" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Huele Que Flipas" />
    <meta property="og:title" content="Huele Que Flipas | Perfumes de equivalencia que huelen a lujo" />
    <meta
      property="og:description"
      content="Huelen a lujo sin pagar lujo. Colección unisex, vibe premium y ayuda para elegir."
    />
    <meta property="og:url" content="https://huelequeflipas.es/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Huele Que Flipas | Perfumes de equivalencia" />
    <meta
      name="twitter:description"
      content="Perfumes de equivalencia con vibra premium. Huelen a lujo sin pagar lujo."
    />

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: "#0B1220"
              },
              accent: {
                DEFAULT: "#0284c7",
                soft: "#38bdf8"
              }
            }
          }
        }
      };
    </script>

    <style>
      :root {
        --nav-h: 80px;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #fafafa;
      }

      h1, h2, h3, .font-syne {
        font-family: "Syne", sans-serif;
      }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: var(--nav-h);
      }

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }

      ::-webkit-scrollbar-thumb {
        background: #e2e2e2;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #d1d1d1;
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
      }
    </style>

    <!-- Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Huele Que Flipas",
        "url": "https://huelequeflipas.es/",
        "areaServed": "ES",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "San Martín de la Vega",
          "addressRegion": "Madrid",
          "addressCountry": "ES"
        }
      }
    </script>

    <!-- IMPORTANTE: carga la app -->
    <script type="module" src="/index.tsx"></script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
